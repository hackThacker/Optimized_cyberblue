#       condition: service_healthy

# ──────────────────────────────────────────────────────────────────
# FIX 5: shuffle-opensearch has 1024m heap — too low for Shuffle
# ──────────────────────────────────────────────────────────────────
# FIND THIS in shuffle-opensearch:
#   - "OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m"
#
# REPLACE WITH:
#   - "OPENSEARCH_JAVA_OPTS=-Xms1536m -Xmx1536m"

# ──────────────────────────────────────────────────────────────────
