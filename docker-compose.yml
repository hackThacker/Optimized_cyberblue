# === WAZUH INDEXER (fix heap + add healthcheck) ===
WAZUH_INDEXER_FIXED: |
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.12.0
    container_name: wazuh-indexer
    hostname: wazuh.indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms3g -Xmx3g"    # FIX: was 1g — too low!
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:                                   # FIX: was missing entirely
      test: "curl -sk https://localhost:9200/_cluster/health || exit 1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.key
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem
      - ./wazuh/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./wazuh/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
    depends_on:
      - generator
    networks:
      - cyber-blue

# === WAZUH DASHBOARD (fix depends_on to wait for indexer health) ===
WAZUH_DASHBOARD_FIXED: |
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.12.0
    container_name: wazuh-dashboard
    hostname: wazuh.dashboard
    restart: always
    ports:
      - 7001:5601
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./wazuh/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./wazuh/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      wazuh.indexer:
        condition: service_healthy    # FIX: waits for indexer to be actually ready
      wazuh.manager:
        condition: service_started
      generator:
        condition: service_completed_successfully
    links:
      - wazuh.indexer:wazuh.indexer
      - wazuh.manager:wazuh.manager
    networks:
      - cyber-blue

# === ELASTICSEARCH (add healthcheck so Cortex waits for it) ===
ELASTICSEARCH_FIXED: |
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    container_name: elasticsearch
    environment:
      - http.host=0.0.0.0
      - discovery.type=single-node
      - script.allowed_types=inline
      - thread_pool.search.queue_size=100000
      - thread_pool.write.queue_size=10000
    healthcheck:                                   # FIX: was missing
      test: "curl -s http://localhost:9200/_cluster/health || exit 1"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    ports:
      - "9210:9200"
      - "9300:9300"
    networks:
      - cyber-blue

# === CORTEX (wait for elasticsearch to be healthy) ===
CORTEX_FIXED: |
  cortex:
    image: thehiveproject/cortex:latest
    container_name: cortex
    environment:
      - job_directory=${job_directory}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      elasticsearch:
        condition: service_healthy    # FIX: was just "- elasticsearch" (no health check)
    restart: unless-stopped
    ports:
      - "0.0.0.0:7006:9001"
    networks:
      - cyber-blue

# === SHUFFLE OPENSEARCH (increase heap from 1g to 1.5g) ===
SHUFFLE_OS_FIXED: |
  shuffle-opensearch:
    image: opensearchproject/opensearch:3.0.0
    container_name: shuffle-opensearch
    hostname: shuffle-opensearch
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1536m -Xmx1536m"  # FIX: was 1024m
      - bootstrap.memory_lock=true
      - DISABLE_PERFORMANCE_ANALYZER_AGENT_CLI=true
      - cluster.initial_master_nodes=shuffle-opensearch
      - cluster.routing.allocation.disk.threshold_enabled=false
      - cluster.name=shuffle-cluster
      - node.name=shuffle-opensearch
      - node.store.allow_mmap=false
      - discovery.seed_hosts=shuffle-opensearch
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${SHUFFLE_OPENSEARCH_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./shuffle/shuffle-database:/usr/share/opensearch/data:z
    ports:
      - 9201:9200
    networks:
      - cyber-blue
    restart: unless-stopped
    depends_on:
      - opensearch-init

# === OPENSEARCH-INIT (run as root so chown works instantly) ===
OPENSEARCH_INIT_FIXED: |
  opensearch-init:
    image: alpine
    container_name: opensearch-init
    user: "0"                                      # FIX: run as root for chown
    volumes:
      - ./shuffle/shuffle-database:/usr/share/opensearch/data
    command: chown -R 1000:1000 /usr/share/opensearch/data
    restart: "no"
