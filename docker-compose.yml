#     wazuh.indexer:
#       condition: service_healthy
#     wazuh.manager:
#       condition: service_started
#     generator:
#       condition: service_completed_successfully

# ──────────────────────────────────────────────────────────────────
# FIX 3: opensearch-init blocks Shuffle startup (chown takes time)
# ──────────────────────────────────────────────────────────────────
# FIND THIS:
#   opensearch-init:
#     image: alpine
#     command: chown -R 1000:1000 /usr/share/opensearch/data
#     restart: "no"
#
# ADD:
#     user: "0"   ← run as root so chown works instantly

# ──────────────────────────────────────────────────────────────────
# FIX 4: elasticsearch has no healthcheck — Cortex starts before ES is ready
# ──────────────────────────────────────────────────────────────────
# ADD to elasticsearch service:
#   healthcheck:
#     test: curl -s http://localhost:9200/_cluster/health || exit 1
